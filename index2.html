<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>trang chính</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI','Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header-container{
            background-color: white;
            border: 1px solid #ccc;
            display:flex;
            align-items:center;
            max-width: 800px;
            padding: 10px 20px;
            margin: 0 auto  20px auto;
            border-radius:10px;
            justify-content: space-between;
        }
        .search-full-width {
            background: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            max-width: 600px;
            padding: 10px 20px;
            margin: 0 auto 20px auto;
        }
        .search-full-width input {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px;
            font-size: 16px;
        }
        .hidden{
            display:none;
        }
        .back-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #4CAF50;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        button{
            padding: 10px 20px;
            cursor: pointer; 
            background: none;
            border: none;
            transition: 0.3s;
        }
        button:hover{
            background-color: #eee;
            border-radius: 5px;
        }

     
        
    </style>
</head>
<body>
    <div align="center">
        <h1>SÁCH TỐT GIÁ RẺ 3 ANH TÀI</h1>
    </div>

    <div id="home-page" class="content-box">
        <div class="header-container">
            <button onclick="showPage('home-page')">
                <i class="fa-solid fa-house-chimney"></i>
            </button>

            <div>
                <button onclick="showPage('search-page')">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <button onclick="showPage('cart-page')">
                    <i class="fa-solid fa-cart-shopping"></i>
                </button>
            </div>
        </div>
        <h3 align="center">Chào mừng bạn đến với tiệm sách!</h3>
    </div>

    <div id="search-page" class="content-box hidden">
        <div class="search-full-width">
            <input type="text" id="searchInput" placeholder="Nhập tên sách em guộc ơi..." style="padding: 10px; width: 80%;" />
            <i class="fa-solid fa-magnifying-glass" style="color: #888;"></i>
        </div>
        <div class="back-button" onclick="showPage('home-page')">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
    </div>
    <div id="cart-page" class="content-box hidden">
        <div align="center"  style="margin-top: 50px;">
                <i class="fa-solid fa-magnifying-glass"></i>
            <p>Lựa cuốn sách mà em guộc thích nhé <i class="fa-solid fa-face-smile-beam"></i></p>
            </div>

        <div class="back-button" onclick="showPage('home-page')">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
        </div>

    <script>
        function showPage(pageId) {
            let allPages = document.querySelectorAll('.content-box');
            allPages.forEach(page => {
                page.classList.add('hidden');
            });

            document.getElementById(pageId).classList.remove('hidden');
        }
        function performSearch() {
            let val = document.getElementById('searchInput').value;
            if (val) {
                alert("Đang tìm sách: " + val);
            } else {
                alert("Chưa nhập gì mà em guộc!");
            }
        }
    </script>

</body>
</html>
